<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>강력한 비밀번호 생성기 - 안전한 보안 암호</title>
    
    <link rel="stylesheet" href="css/style.css">
    <script src="js/common.js"></script>

    <style>
        /* 결과 표시 영역 */
        .result-container {
            position: relative;
            margin-bottom: 30px;
        }
        .password-display {
            width: 100%;
            padding: 20px;
            font-size: 24px;
            font-family: 'Consolas', 'Monaco', monospace; /* 글자 구분용 폰트 */
            text-align: center;
            border: 2px solid #3498db;
            border-radius: 10px;
            background-color: #f8fbff;
            color: #2c3e50;
            letter-spacing: 2px;
            box-sizing: border-box;
            word-break: break-all;
        }
        
        /* 옵션 설정 영역 */
        .settings-box {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #eee;
        }

        .range-group {
            margin-bottom: 25px;
            text-align: center;
        }
        
        input[type=range] {
            width: 100%;
            max-width: 400px;
            cursor: pointer;
        }

        .length-value {
            font-size: 20px;
            font-weight: bold;
            color: #3498db;
            display: inline-block;
            width: 40px;
        }

        .checkbox-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            cursor: pointer;
            font-size: 16px;
            user-select: none;
        }
        .checkbox-label input {
            width: 20px;
            height: 20px;
            margin-right: 8px;
            cursor: pointer;
        }

        /* 큰 버튼 스타일 */
        .btn-generate {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-generate:hover { background-color: #2980b9; }

        .btn-copy {
            margin-top: 10px;
            width: 100%;
            padding: 12px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-copy:hover { background-color: #219150; }

        /* 보안 배지 */
        .security-badge {
            display: inline-block;
            background-color: #e8f5e9;
            color: #2e7d32;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 15px;
            border: 1px solid #c8e6c9;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-slot">광고 영역 (Ad Placeholder)</div>

        <div class="tool-box">
            <div style="text-align: center;">
                <h2 style="margin-bottom: 10px;">🔐 안전한 비밀번호 생성기</h2>
                <div class="security-badge">🛡️ 100% 클라이언트 생성 (서버 전송 X)</div>
            </div>

            <div class="result-container">
                <input type="text" id="result" class="password-display" readonly value="Click Generate">
                <button onclick="copyPassword()" class="btn-copy">📋 비밀번호 복사</button>
            </div>

            <div class="settings-box">
                <div class="range-group">
                    <label style="font-weight: bold; display: block; margin-bottom: 10px;">
                        비밀번호 길이: <span id="lengthVal" class="length-value">16</span>자
                    </label>
                    <input type="range" id="lengthRange" min="4" max="50" value="16" oninput="syncLength()">
                </div>

                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="chkUpper" checked> 대문자 (A-Z)
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="chkLower" checked> 소문자 (a-z)
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="chkNumber" checked> 숫자 (0-9)
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="chkSymbol" checked> 특수문자 (!@#)
                    </label>
                </div>

                <button onclick="generate()" class="btn-generate">🔄 새 비밀번호 생성</button>
            </div>
        </div>

        <div style="margin-top: 50px; line-height: 1.6; color: #444;">
            <h3>왜 이 비밀번호 생성기가 안전한가요?</h3>
            <p>
                이 도구는 자바스크립트의 <code>Crypto API</code>를 사용하여 난수를 생성합니다. 
                단순한 랜덤 함수(Math.random)보다 훨씬 예측 불가능하고 강력합니다. 
                또한, 모든 과정이 브라우저 내부에서만 이루어지며, 생성된 비밀번호는 어디에도 저장되거나 전송되지 않습니다.
            </p>
        </div>

        <div class="ad-slot">광고 영역 (Ad Placeholder)</div>
    </div>

    <script>
        // DOM 요소
        const elResult = document.getElementById('result');
        const elRange = document.getElementById('lengthRange');
        const elLengthVal = document.getElementById('lengthVal');
        
        const elUpper = document.getElementById('chkUpper');
        const elLower = document.getElementById('chkLower');
        const elNumber = document.getElementById('chkNumber');
        const elSymbol = document.getElementById('chkSymbol');

        // 문자셋 정의
        const CHARS = {
            upper: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
            lower: 'abcdefghijklmnopqrstuvwxyz',
            number: '0123456789',
            symbol: '!@#$%^&*()_+~`|}{[]:;?><,./-='
        };

        // 길이 슬라이더 동기화
        function syncLength() {
            elLengthVal.innerText = elRange.value;
            generate(); // 슬라이더 움직일 때마다 자동 생성
        }

        // 비밀번호 생성 로직
        function generate() {
            const length = parseInt(elRange.value);
            let charset = "";
            let password = "";

            if(elUpper.checked) charset += CHARS.upper;
            if(elLower.checked) charset += CHARS.lower;
            if(elNumber.checked) charset += CHARS.number;
            if(elSymbol.checked) charset += CHARS.symbol;

            // 체크박스가 하나도 선택 안 된 경우
            if(charset === "") {
                elResult.value = "옵션을 하나 이상 선택하세요";
                return;
            }

            // 암호학적으로 안전한 난수 생성 (Crypto API 사용)
            const randomValues = new Uint32Array(length);
            window.crypto.getRandomValues(randomValues);

            for (let i = 0; i < length; i++) {
                // charset 길이로 나눈 나머지 값을 인덱스로 사용
                const index = randomValues[i] % charset.length;
                password += charset[index];
            }

            elResult.value = password;
        }

        // 복사 기능
        function copyPassword() {
            const text = elResult.value;
            if(!text || text === "옵션을 하나 이상 선택하세요") return;

            elResult.select();
            document.execCommand('copy');
            alert('비밀번호가 클립보드에 복사되었습니다!');
        }

        // 초기 실행
        generate();
    </script>
</body>
</html>
