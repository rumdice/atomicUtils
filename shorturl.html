<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>단축 URL 생성기 (URL Shortener)</title>
    <meta name="description" content="긴 URL을 짧은 주소로 무료로 단축하고 QR코드까지 함께 생성하는 온라인 URL 단축기입니다.">
    <link rel="canonical" href="https://tools.rumdice.com/shorturl.html">

    <link rel="stylesheet" href="css/style.css">
    <script src="js/common.js"></script>

    <style>
        .shortener-container {
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .input-group input {
            flex: 1;
            padding: 15px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
        }
        .input-group input:focus { border-color: #3498db; }

        .btn-shorten {
            padding: 15px 25px;
            background-color: #3498db;
            color: white;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            min-width: 120px;
        }
        .btn-shorten:disabled { background-color: #ccc; cursor: not-allowed; }

        /* 결과 영역 */
        .result-card {
            display: none; /* 초기에는 숨김 */
            background: white;
            border: 1px solid #eee;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            margin-top: 30px;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .short-url {
            font-size: 24px;
            font-weight: bold;
            color: #2c3e50;
            margin: 20px 0;
            word-break: break-all;
            font-family: monospace;
        }

        .qr-code {
            margin-top: 20px;
            border: 10px solid white;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .loading-spinner {
            display: inline-block;
            width: 20px; 
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="tool-box shortener-container">
            <h2>🔗 URL 단축기</h2>
            <p style="color: #666; margin-bottom: 30px;">
                긴 주소를 짧게 줄이고 QR코드도 생성하세요.
            </p>

            <div class="input-group">
                <input type="url" id="longUrl" placeholder="https://example.com/very/long/url..." 
                       onkeypress="if(event.key === 'Enter') executeShorten()">
                <button class="btn-shorten" onclick="executeShorten()" id="btnSubmit">
                    <span id="btnText">단축하기</span>
                    <div id="spinner" class="loading-spinner"></div>
                </button>
            </div>

            <div id="resultArea" class="result-card">
                <div style="color: #888; font-size: 14px;">Shortened URL</div>
                
                <div class="short-url" id="shortUrlDisplay">https://bit.ly/sample</div>
                
                <div style="display: flex; justify-content: center; gap: 10px;">
                    <button onclick="copyUrl()" style="background-color: #27ae60;">📋 복사하기</button>
                    <button onclick="openUrl()" style="background-color: #7f8c8d;">🚀 이동하기</button>
                </div>

                <div style="margin-top: 30px; border-top: 1px dashed #ddd; padding-top: 20px;">
                    <div style="color: #888; font-size: 14px; margin-bottom: 10px;">QR Code</div>
                    <img id="qrImage" class="qr-code" src="" alt="QR Code" width="150">
                </div>
            </div>
        </div>

        <div class="ad-slot">광고 영역 (Ad Placeholder)</div>

        <div style="margin-top: 50px; line-height: 1.6; color: #444;">
            <h3>URL 단축이란?</h3>
            <p>너무 길어서 공유하기 힘든 링크를 짧은 주소로 변환해 주는 서비스입니다. SMS 전송이나 소셜 미디어 공유 시 유용하며, QR코드로 변환하여 오프라인 마케팅에도 활용할 수 있습니다.</p>
        </div>

        <div class="ad-slot">광고 영역 (Ad Placeholder)</div>
    </div>

    <script>
        // 무료 공개 단축 API (is.gd: 별도 키 없이 사용 가능, CORS 지원)
        const SHORTEN_API_URL = "https://is.gd/create.php?format=json&url=";

        async function executeShorten() {
            const longUrlInput = document.getElementById('longUrl');
            const resultArea = document.getElementById('resultArea');
            const shortUrlDisplay = document.getElementById('shortUrlDisplay');
            const qrImage = document.getElementById('qrImage');
            const btnSubmit = document.getElementById('btnSubmit');
            const spinner = document.getElementById('spinner');
            const btnText = document.getElementById('btnText');

            const originalUrl = longUrlInput.value.trim();
            

            // 1. 유효성 검사
            if (!originalUrl) {
                alert("URL을 입력해주세요.");
                return;
            }
            // http가 없으면 붙여주는 센스 (사용자 편의)
            let finalUrl = originalUrl;
            if (!finalUrl.startsWith('http://') && !finalUrl.startsWith('https://')) {
                finalUrl = 'https://' + finalUrl;
            }
            // if (!originalUrl.startsWith('http')) {
            //     alert("URL은 http:// 또는 https://로 시작해야 합니다.");
            //     return;
            // }

            // UI 로딩 상태 변경
            btnSubmit.disabled = true;
            btnText.style.display = 'none';
            spinner.style.display = 'inline-block';
            resultArea.style.display = 'none';

            let shortUrl = "";

            try {
                const response = await fetch(SHORTEN_API_URL + encodeURIComponent(finalUrl));
                const data = await response.json();

                if (data.shorturl) {
                    shortUrl = data.shorturl;
                } else {
                    alert("단축 실패: " + (data.errormessage || "알 수 없는 오류"));
                    return;
                }
            } catch (error) {
                alert("단축에 실패했습니다. 잠시 후 다시 시도해주세요.");
                console.error(error);
                return;
            } finally {
                // UI 원상 복구
                btnSubmit.disabled = false;
                btnText.style.display = 'inline';
                spinner.style.display = 'none';
            }

            // 성공 시 결과 표시
            shortUrlDisplay.innerText = shortUrl;
            shortUrlDisplay.href = shortUrl;
            qrImage.src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(shortUrl)}`;
            resultArea.style.display = 'block';
        }

        function copyUrl() {
            const url = document.getElementById('shortUrlDisplay').innerText;
            navigator.clipboard.writeText(url).then(() => {
                alert("복사되었습니다!");
            });
        }

        function openUrl() {
            const url = document.getElementById('shortUrlDisplay').innerText;
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
